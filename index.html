<script type="module">
const THRESHOLD = 4;
const svgLayer = document.getElementById('svg-layer');
const svgNS = 'http://www.w3.org/2000/svg';
const hintEl = document.getElementById('hint');

function updateHint() {
  var hasContent = svgLayer.querySelector('g') || document.querySelector('.text-block');
  hintEl.style.opacity = hasContent ? '0' : '1';
}

function updateTextMaxWidth(block) {
  if (!block.style.width) {
    block.style.maxWidth = (window.innerWidth - parseInt(block.style.left) - 4) + 'px';
  }
}

var colorProbe = document.createElement('div');
colorProbe.style.display = 'none';
document.body.appendChild(colorProbe);

var colorAliases = {
  'lightred':'#ff6666','darkred':'darkred','lightblue':'lightblue','darkblue':'darkblue',
  'lightgreen':'lightgreen','darkgreen':'darkgreen','lightyellow':'lightyellow','darkyellow':'#cccc00',
  'lightorange':'#ffcc80','darkorange':'darkorange','lightpurple':'#cc99ff','darkpurple':'#660099',
  'lightpink':'lightpink','darkpink':'#ff1493','lightcyan':'lightcyan','darkcyan':'darkcyan',
  'lightmagenta':'#ff80ff','darkmagenta':'darkmagenta','lightgray':'lightgray','darkgray':'darkgray',
  'lightgrey':'lightgrey','darkgrey':'darkgrey','grey':'grey','gray':'gray',
  'lightbrown':'#c4a882','darkbrown':'#4a2c0a','lightteal':'#80e0d0','darkteal':'#008080',
  'lightviolet':'#ee82ee','darkviolet':'darkviolet','lightcoral':'lightcoral','darkcoral':'#cd5b45',
  'lightgold':'#ffe066','darkgold':'#b8860b','lightolive':'#c0c860','darkolive':'#556b2f',
  'lightmaroon':'#cc6680','darkmaroon':'#800000','lightnavy':'#6666cc','darknavy':'#000066',
  'lightindigo':'#9999ff','darkindigo':'#330066','lightlime':'#ccff99','darklime':'#66cc00',
  'lightsalmon':'lightsalmon','darksalmon':'darksalmon','lighttan':'#ffe4c4','darktan':'#d2a66a'
};

function isValidColor(str) {
  colorProbe.style.color = '';
  colorProbe.style.color = str;
  return colorProbe.style.color !== '';
}

function resolveColor(buf) {
  if (isValidColor(buf)) return buf;
  var norm = buf.replace(/\s+/g, '');
  if (isValidColor(norm)) return norm;
  var lower = norm.toLowerCase();
  if (colorAliases[lower]) return colorAliases[lower];
  return null;
}

function resolveColorFromBuffer(buf) {
  var result = resolveColor(buf);
  if (result) return result;
  var words = buf.split(/\s+/);
  for (var i = 1; i < words.length; i++) {
    var suffix = words.slice(i).join(' ');
    result = resolveColor(suffix);
    if (result) return result;
  }
  return null;
}

let startX, startY;
let isDragging = false;
let currentGroup = null;
let currentPath = null;
let currentHitPath = null;
let points = [];
let selectedStroke = null;
let selectedTextBlock = null;
let selectionBox = null;
let undoStack = [];
let colorBuffer = '';
let colorBufferTimer = null;
let redoStack = [];
let multiSelected = [];
let multiSelectBox = null;
let suppressContextMenu = false;

function getTransformState(g) {
  return {
    tx: parseFloat(g.dataset.tx || 0),
    ty: parseFloat(g.dataset.ty || 0),
    sx: parseFloat(g.dataset.sx || 1),
    sy: parseFloat(g.dataset.sy || 1),
    sox: parseFloat(g.dataset.sox || 0),
    soy: parseFloat(g.dataset.soy || 0),
  };
}

function applyTransform(g, state) {
  g.dataset.tx = state.tx;
  g.dataset.ty = state.ty;
  g.dataset.sx = state.sx;
  g.dataset.sy = state.sy;
  g.dataset.sox = state.sox;
  g.dataset.soy = state.soy;
  if (state.sx === 1 && state.sy === 1) {
    g.setAttribute('transform', 'translate(' + state.tx + ',' + state.ty + ')');
  } else {
    g.setAttribute('transform',
      'translate(' + state.tx + ',' + state.ty + ') ' +
      'translate(' + state.sox + ',' + state.soy + ') ' +
      'scale(' + state.sx + ',' + state.sy + ') ' +
      'translate(' + (-state.sox) + ',' + (-state.soy) + ')'
    );
  }
}

function bakeTransform(g) {
  var state = getTransformState(g);
  if (state.tx === 0 && state.ty === 0 && state.sx === 1 && state.sy === 1) return;

  function transformCoord(x, y) {
    var nx = (x - state.sox) * state.sx + state.sox + state.tx;
    var ny = (y - state.soy) * state.sy + state.soy + state.ty;
    return [nx, ny];
  }

  function transformPathD(d) {
    return d.replace(/([-\d.]+)\s*,\s*([-\d.]+)/g, function (_, x, y) {
      var pt = transformCoord(parseFloat(x), parseFloat(y));
      return pt[0].toFixed(2) + ',' + pt[1].toFixed(2);
    });
  }

  var visPath = g.querySelector('path.visible');
  var hitPath = g.querySelector('path.hit-target');
  if (visPath) visPath.setAttribute('d', transformPathD(visPath.getAttribute('d')));
  if (hitPath) hitPath.setAttribute('d', transformPathD(hitPath.getAttribute('d')));

  applyTransform(g, { tx: 0, ty: 0, sx: 1, sy: 1, sox: 0, soy: 0 });
}

// ── Point pre-filtering ───────────────────────────────────────────

const SMOOTH_WINDOW = 6;

function smoothPoints(raw) {
  if (raw.length < 3) return raw;
  var result = [raw[0]];
  for (var i = 1; i < raw.length; i++) {
    var w = Math.min(i, SMOOTH_WINDOW);
    var sx = 0, sy = 0;
    for (var j = 0; j <= w; j++) {
      sx += raw[i - j][0];
      sy += raw[i - j][1];
    }
    result.push([sx / (w + 1), sy / (w + 1)]);
  }
  return result;
}

// ── Smooth SVG path builder ───────────────────────────────────────

function buildSmoothPath(pts) {
  if (pts.length < 2) return '';
  if (pts.length === 2) {
    return 'M' + pts[0][0].toFixed(2) + ',' + pts[0][1].toFixed(2) +
      ' L' + pts[1][0].toFixed(2) + ',' + pts[1][1].toFixed(2);
  }
  var avg = function (a, b) { return (a + b) / 2; };
  var d = 'M' + pts[0][0].toFixed(2) + ',' + pts[0][1].toFixed(2);
  d += ' L' + avg(pts[0][0], pts[1][0]).toFixed(2) + ',' + avg(pts[0][1], pts[1][1]).toFixed(2);
  for (var i = 1; i < pts.length - 1; i++) {
    var mid = [avg(pts[i][0], pts[i + 1][0]), avg(pts[i][1], pts[i + 1][1])];
    d += ' Q' + pts[i][0].toFixed(2) + ',' + pts[i][1].toFixed(2) +
      ' ' + mid[0].toFixed(2) + ',' + mid[1].toFixed(2);
  }
  d += ' L' + pts[pts.length - 1][0].toFixed(2) + ',' + pts[pts.length - 1][1].toFixed(2);
  return d;
}

function buildHitPathD(pts) {
  if (pts.length < 2) return '';
  var d = 'M' + pts[0][0] + ',' + pts[0][1];
  for (var i = 1; i < pts.length; i++) {
    d += ' L' + pts[i][0] + ',' + pts[i][1];
  }
  return d;
}

function buildEllipsePath(cx, cy, rx, ry) {
  var kx = rx * 0.5522847498, ky = ry * 0.5522847498;
  return 'M' + (cx + rx).toFixed(2) + ',' + cy.toFixed(2) +
    ' C' + (cx + rx).toFixed(2) + ',' + (cy - ky).toFixed(2) + ' ' + (cx + kx).toFixed(2) + ',' + (cy - ry).toFixed(2) + ' ' + cx.toFixed(2) + ',' + (cy - ry).toFixed(2) +
    ' C' + (cx - kx).toFixed(2) + ',' + (cy - ry).toFixed(2) + ' ' + (cx - rx).toFixed(2) + ',' + (cy - ky).toFixed(2) + ' ' + (cx - rx).toFixed(2) + ',' + cy.toFixed(2) +
    ' C' + (cx - rx).toFixed(2) + ',' + (cy + ky).toFixed(2) + ' ' + (cx - kx).toFixed(2) + ',' + (cy + ry).toFixed(2) + ' ' + cx.toFixed(2) + ',' + (cy + ry).toFixed(2) +
    ' C' + (cx + kx).toFixed(2) + ',' + (cy + ry).toFixed(2) + ' ' + (cx + rx).toFixed(2) + ',' + (cy + ky).toFixed(2) + ' ' + (cx + rx).toFixed(2) + ',' + cy.toFixed(2) + ' Z';
}

function buildCirclePath(cx, cy, r) {
  return buildEllipsePath(cx, cy, r, r);
}

function fitCircle(pts) {
  var sumX = 0, sumY = 0;
  for (var i = 0; i < pts.length; i++) { sumX += pts[i][0]; sumY += pts[i][1]; }
  var cx = sumX / pts.length, cy = sumY / pts.length;
  var sumRx = 0, sumRy = 0;
  for (var i = 0; i < pts.length; i++) {
    sumRx += Math.abs(pts[i][0] - cx);
    sumRy += Math.abs(pts[i][1] - cy);
  }
  var rx = sumRx / pts.length * 1.57;
  var ry = sumRy / pts.length * 1.57;
  var ratio = Math.min(rx, ry) / Math.max(rx, ry);
  if (ratio > 0.7) {
    var r = (rx + ry) / 2;
    return { cx: cx, cy: cy, rx: r, ry: r };
  }
  return { cx: cx, cy: cy, rx: rx, ry: ry };
}

function rdpSimplify(pts, epsilon) {
  if (pts.length <= 2) return pts.slice();
  var dmax = 0, idx = 0;
  var first = pts[0], last = pts[pts.length - 1];
  var lx = last[0] - first[0], ly = last[1] - first[1];
  var lenSq = lx * lx + ly * ly;
  for (var i = 1; i < pts.length - 1; i++) {
    var d;
    if (lenSq === 0) {
      d = Math.hypot(pts[i][0] - first[0], pts[i][1] - first[1]);
    } else {
      var t = ((pts[i][0] - first[0]) * lx + (pts[i][1] - first[1]) * ly) / lenSq;
      t = Math.max(0, Math.min(1, t));
      var px = first[0] + t * lx, py = first[1] + t * ly;
      d = Math.hypot(pts[i][0] - px, pts[i][1] - py);
    }
    if (d > dmax) { dmax = d; idx = i; }
  }
  if (dmax > epsilon) {
    var left = rdpSimplify(pts.slice(0, idx + 1), epsilon);
    var right = rdpSimplify(pts.slice(idx), epsilon);
    return left.slice(0, -1).concat(right);
  }
  return [first, last];
}

function fitTriangle(verts) {
  var sortedX = verts.slice().sort(function (a, b) { return a[0] - b[0]; });
  var sortedY = verts.slice().sort(function (a, b) { return a[1] - b[1]; });
  var gapLeft = sortedX[1][0] - sortedX[0][0];
  var gapRight = sortedX[2][0] - sortedX[1][0];
  var gapTop = sortedY[1][1] - sortedY[0][1];
  var gapBottom = sortedY[2][1] - sortedY[1][1];

  var maxGap = Math.max(gapLeft, gapRight, gapTop, gapBottom);
  var dir, peak, base;
  if (maxGap === gapTop) {
    dir = 'up'; peak = sortedY[0]; base = [sortedY[1], sortedY[2]];
  } else if (maxGap === gapBottom) {
    dir = 'down'; peak = sortedY[2]; base = [sortedY[0], sortedY[1]];
  } else if (maxGap === gapLeft) {
    dir = 'left'; peak = sortedX[0]; base = [sortedX[1], sortedX[2]];
  } else {
    dir = 'right'; peak = sortedX[2]; base = [sortedX[0], sortedX[1]];
  }

  var baseMx = (base[0][0] + base[1][0]) / 2;
  var baseMy = (base[0][1] + base[1][1]) / 2;
  var baseLen;
  if (dir === 'up' || dir === 'down') {
    baseLen = Math.abs(base[1][0] - base[0][0]);
    if (baseLen < 10) baseLen = Math.hypot(base[1][0] - base[0][0], base[1][1] - base[0][1]);
  } else {
    baseLen = Math.abs(base[1][1] - base[0][1]);
    if (baseLen < 10) baseLen = Math.hypot(base[1][0] - base[0][0], base[1][1] - base[0][1]);
  }

  var h = baseLen * 0.866;

  if (dir === 'up' || dir === 'down') {
    var bL = Math.min(base[0][0], base[1][0]);
    var bR = Math.max(base[0][0], base[1][0]);
    var rel = (peak[0] - bL) / (baseLen || 1);
    var sign = dir === 'up' ? -1 : 1;
    if (rel < 0.3) {
      return [[bL, baseMy + sign * baseLen], [bR, baseMy], [bL, baseMy]];
    } else if (rel > 0.7) {
      return [[bR, baseMy + sign * baseLen], [bR, baseMy], [bL, baseMy]];
    } else {
      return [[baseMx, baseMy + sign * h], [baseMx + baseLen / 2, baseMy], [baseMx - baseLen / 2, baseMy]];
    }
  } else {
    var bT = Math.min(base[0][1], base[1][1]);
    var bB = Math.max(base[0][1], base[1][1]);
    var rel = (peak[1] - bT) / (baseLen || 1);
    var sign = dir === 'left' ? -1 : 1;
    if (rel < 0.3) {
      return [[baseMx + sign * baseLen, bT], [baseMx, bT], [baseMx, bB]];
    } else if (rel > 0.7) {
      return [[baseMx + sign * baseLen, bB], [baseMx, bB], [baseMx, bT]];
    } else {
      return [[baseMx + sign * h, baseMy], [baseMx, baseMy - baseLen / 2], [baseMx, baseMy + baseLen / 2]];
    }
  }
}

function buildTrianglePath(p1, p2, p3) {
  return 'M' + p1[0].toFixed(2) + ',' + p1[1].toFixed(2) +
    ' L' + p2[0].toFixed(2) + ',' + p2[1].toFixed(2) +
    ' L' + p3[0].toFixed(2) + ',' + p3[1].toFixed(2) + ' Z';
}

function fitRectangle(verts) {
  var cx = (verts[0][0] + verts[1][0] + verts[2][0] + verts[3][0]) / 4;
  var cy = (verts[0][1] + verts[1][1] + verts[2][1] + verts[3][1]) / 4;

  var bestAngle = 0, bestLen = 0;
  for (var i = 0; i < 4; i++) {
    var j = (i + 1) % 4;
    var edgeLen = Math.hypot(verts[j][0] - verts[i][0], verts[j][1] - verts[i][1]);
    if (edgeLen > bestLen) {
      bestLen = edgeLen;
      bestAngle = Math.atan2(verts[j][1] - verts[i][1], verts[j][0] - verts[i][0]);
    }
  }

  var deg = bestAngle * 180 / Math.PI;
  var SNAP = 10;
  var rem = ((deg % 90) + 90) % 90;
  if (rem < SNAP) bestAngle = Math.round(deg / 90) * 90 * Math.PI / 180;
  else if (rem > 90 - SNAP) bestAngle = Math.round(deg / 90) * 90 * Math.PI / 180;

  var cosA = Math.cos(bestAngle), sinA = Math.sin(bestAngle);
  var minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;
  for (var i = 0; i < 4; i++) {
    var dx = verts[i][0] - cx, dy = verts[i][1] - cy;
    var u = dx * cosA + dy * sinA;
    var v = -dx * sinA + dy * cosA;
    if (u < minU) minU = u; if (u > maxU) maxU = u;
    if (v < minV) minV = v; if (v > maxV) maxV = v;
  }

  var w = maxU - minU, h = maxV - minV;
  var ratio = Math.min(w, h) / Math.max(w, h);
  if (ratio > 0.7) {
    var side = (w + h) / 2;
    var halfS = side / 2;
    var midU = (minU + maxU) / 2, midV = (minV + maxV) / 2;
    minU = midU - halfS; maxU = midU + halfS;
    minV = midV - halfS; maxV = midV + halfS;
  }

  var corners = [[minU, minV], [maxU, minV], [maxU, maxV], [minU, maxV]];
  return corners.map(function (c) {
    return [cx + c[0] * cosA - c[1] * sinA, cy + c[0] * sinA + c[1] * cosA];
  });
}

function buildRectPath(p1, p2, p3, p4) {
  return 'M' + p1[0].toFixed(2) + ',' + p1[1].toFixed(2) +
    ' L' + p2[0].toFixed(2) + ',' + p2[1].toFixed(2) +
    ' L' + p3[0].toFixed(2) + ',' + p3[1].toFixed(2) +
    ' L' + p4[0].toFixed(2) + ',' + p4[1].toFixed(2) + ' Z';
}

// ── Selection ─────────────────────────────────────────────────────

function removeSelectionBox() {
  if (selectionBox) {
    selectionBox.remove();
    selectionBox = null;
  }
}

function createSelectionBox(isText) {
  removeSelectionBox();
  var box = document.createElement('div');
  box.className = 'selection-box';
  ['nw', 'ne', 'sw', 'se'].forEach(function (corner) {
    var handle = document.createElement('div');
    handle.className = 'selection-handle ' + corner;
    handle.dataset.corner = corner;
    box.appendChild(handle);
  });
  if (isText) {
    ['n', 's', 'e', 'w'].forEach(function (edge) {
      var handle = document.createElement('div');
      handle.className = 'selection-handle ' + edge;
      handle.dataset.edge = edge;
      box.appendChild(handle);
    });
  }
  document.body.appendChild(box);
  selectionBox = box;
  return box;
}

function deselectMulti() {
  multiSelected = [];
  if (multiSelectBox) {
    multiSelectBox.remove();
    multiSelectBox = null;
  }
}

function positionMultiSelectBox() {
  if (!multiSelectBox || !multiSelected.length) return;
  var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  multiSelected.forEach(function (item) {
    var r = item.el.getBoundingClientRect();
    if (r.left < minX) minX = r.left;
    if (r.top < minY) minY = r.top;
    if (r.right > maxX) maxX = r.right;
    if (r.bottom > maxY) maxY = r.bottom;
  });
  var pad = 4;
  multiSelectBox.style.left = (minX - pad) + 'px';
  multiSelectBox.style.top = (minY - pad) + 'px';
  multiSelectBox.style.width = (maxX - minX + pad * 2) + 'px';
  multiSelectBox.style.height = (maxY - minY + pad * 2) + 'px';
}

function createMultiSelectBox() {
  deselectMulti();
  var box = document.createElement('div');
  box.className = 'multi-select-box';
  ['nw', 'ne', 'sw', 'se'].forEach(function (corner) {
    var handle = document.createElement('div');
    handle.className = 'selection-handle ' + corner;
    handle.dataset.corner = corner;
    handle.dataset.multi = 'true';
    box.appendChild(handle);
  });
  document.body.appendChild(box);
  multiSelectBox = box;
  return box;
}

document.addEventListener('contextmenu', function (e) {
  if (suppressContextMenu) {
    e.preventDefault();
    suppressContextMenu = false;
  }
});

function deselectStroke() {
  selectedStroke = null;
  if (selectedTextBlock) {
    selectedTextBlock.contentEditable = 'true';
    selectedTextBlock.style.userSelect = 'text';
    selectedTextBlock.style.webkitUserSelect = 'text';
    selectedTextBlock = null;
  }
  removeSelectionBox();
  deselectMulti();
  colorBuffer = '';
  clearTimeout(colorBufferTimer);
}

function positionSelectionBox() {
  if (!selectionBox) return;
  var el = selectedStroke || selectedTextBlock;
  if (!el) return;
  var rect = selectedStroke
    ? selectedStroke.getBoundingClientRect()
    : selectedTextBlock.getBoundingClientRect();
  var pad = 2;
  selectionBox.style.left = (rect.left - pad) + 'px';
  selectionBox.style.top = (rect.top - pad) + 'px';
  selectionBox.style.width = (rect.width + pad * 2) + 'px';
  selectionBox.style.height = (rect.height + pad * 2) + 'px';
}

function repositionBoxes() { positionSelectionBox(); positionMultiSelectBox(); }
window.addEventListener('resize', repositionBoxes);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', repositionBoxes);
  window.visualViewport.addEventListener('scroll', repositionBoxes);
}

function syncHitTargetPointerEvents(visPath) {
  var g = visPath.closest('g');
  if (!g) return;
  var ht = g.querySelector('path.hit-target');
  if (!ht) return;
  var hasFill = visPath.style.fill && visPath.style.fill !== 'none';
  ht.style.pointerEvents = hasFill ? 'all' : '';
}

function selectStroke(pathEl) {
  deselectStroke();
  selectedStroke = pathEl;
  createSelectionBox();
  positionSelectionBox();
}

function selectTextBlock(block) {
  deselectStroke();
  selectedTextBlock = block;
  block.contentEditable = 'false';
  block.style.userSelect = 'none';
  block.style.webkitUserSelect = 'none';
  createSelectionBox(true);
  positionSelectionBox();
}

// ── Resize Handles ────────────────────────────────────────────────

let resizing = false;
let resizeCorner = null;
let resizeOrigin = {};
let resizeStartMouse = {};
let resizeStartBox = {};
let resizeBaseTranslate = { x: 0, y: 0 };
let resizeUndoSnapshot = null;
let resizingText = false;
let resizeTextStartFontSize = 16;
let resizeTextStartDiag = 0;
let resizeTextUndoSnapshot = null;
let resizeTextAnchor = {};
let resizingTextEdge = false;
let resizeEdge = null;
let resizeEdgeStartMouse = {};
let resizeEdgeStartRect = {};
let resizeEdgeUndoSnapshot = null;

document.addEventListener('pointerdown', function (e) {
  if (!e.target.classList.contains('selection-handle')) return;

  if (e.target.dataset.edge && selectedTextBlock) {
    e.preventDefault();
    e.stopPropagation();
    resizingTextEdge = true;
    resizeEdge = e.target.dataset.edge;
    resizeEdgeStartMouse = { x: e.clientX, y: e.clientY };
    var bl = selectedTextBlock;
    var w = bl.style.width ? parseInt(bl.style.width) : bl.getBoundingClientRect().width;
    var h = bl.getBoundingClientRect().height;
    resizeEdgeStartRect = {
      left: parseInt(bl.style.left),
      top: parseInt(bl.style.top),
      width: w,
      height: h,
      maxWidth: bl.style.maxWidth || '',
      explicitHeight: bl.style.height || '',
      overflow: bl.style.overflow || ''
    };
    resizeEdgeUndoSnapshot = {
      el: bl,
      left: resizeEdgeStartRect.left,
      top: resizeEdgeStartRect.top,
      width: bl.style.width || '',
      height: bl.style.height || '',
      maxWidth: bl.style.maxWidth || '',
      overflow: bl.style.overflow || ''
    };
    return;
  }

  if (selectedStroke) {
    e.preventDefault();
    e.stopPropagation();
    resizing = true;
    resizeCorner = e.target.dataset.corner;
    resizeStartMouse = { x: e.clientX, y: e.clientY };

    var g = selectedStroke.closest('g');
    var state = getTransformState(g);
    resizeBaseTranslate = { x: state.tx, y: state.ty };

    var visPath = g.querySelector('path.visible');
    var hitPath = g.querySelector('path.hit-target');
    resizeUndoSnapshot = {
      el: g,
      visD: visPath ? visPath.getAttribute('d') : '',
      hitD: hitPath ? hitPath.getAttribute('d') : '',
      state: JSON.parse(JSON.stringify(state))
    };

    const bbox = selectedStroke.getBBox();
    resizeStartBox = { x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height };

    if (resizeCorner === 'nw') resizeOrigin = { x: bbox.x + bbox.width, y: bbox.y + bbox.height };
    else if (resizeCorner === 'ne') resizeOrigin = { x: bbox.x, y: bbox.y + bbox.height };
    else if (resizeCorner === 'sw') resizeOrigin = { x: bbox.x + bbox.width, y: bbox.y };
    else resizeOrigin = { x: bbox.x, y: bbox.y };
  } else if (selectedTextBlock) {
    e.preventDefault();
    e.stopPropagation();
    resizingText = true;
    resizeCorner = e.target.dataset.corner;
    resizeStartMouse = { x: e.clientX, y: e.clientY };
    var rect = selectedTextBlock.getBoundingClientRect();
    resizeTextStartDiag = Math.hypot(rect.width, rect.height);
    resizeTextStartFontSize = parseFloat(window.getComputedStyle(selectedTextBlock).fontSize);
    var bl = selectedTextBlock;
    var origLeft = parseInt(bl.style.left);
    var origTop = parseInt(bl.style.top);
    if (resizeCorner === 'nw') resizeTextAnchor = { x: origLeft + rect.width, y: origTop + rect.height };
    else if (resizeCorner === 'ne') resizeTextAnchor = { x: origLeft, y: origTop + rect.height };
    else if (resizeCorner === 'sw') resizeTextAnchor = { x: origLeft + rect.width, y: origTop };
    else resizeTextAnchor = { x: origLeft, y: origTop };
    resizeTextUndoSnapshot = { el: bl, fontSize: resizeTextStartFontSize, width: bl.style.width || '', maxWidth: bl.style.maxWidth || '', left: origLeft, top: origTop };
  }
}, true);

document.addEventListener('pointermove', function (e) {
  if (resizingTextEdge && selectedTextBlock) {
    const edx = e.clientX - resizeEdgeStartMouse.x;
    const edy = e.clientY - resizeEdgeStartMouse.y;
    const s = resizeEdgeStartRect;
    const bl = selectedTextBlock;
    if (resizeEdge === 'e') {
      const nw = Math.max(20, s.width + edx);
      bl.style.width = nw + 'px';
      bl.style.maxWidth = nw + 'px';
    } else if (resizeEdge === 'w') {
      const nw = Math.max(20, s.width - edx);
      bl.style.left = (s.left + s.width - nw) + 'px';
      bl.style.width = nw + 'px';
      bl.style.maxWidth = nw + 'px';
    } else if (resizeEdge === 's') {
      const nh = Math.max(16, s.height + edy);
      bl.style.height = nh + 'px';
      bl.style.overflow = 'hidden';
    } else if (resizeEdge === 'n') {
      const nh = Math.max(16, s.height - edy);
      bl.style.top = (s.top + s.height - nh) + 'px';
      bl.style.height = nh + 'px';
      bl.style.overflow = 'hidden';
    }
    positionSelectionBox();
    return;
  }

  if (resizingText && selectedTextBlock) {
    const tdx = e.clientX - resizeStartMouse.x;
    const tdy = e.clientY - resizeStartMouse.y;
    const dragDist = Math.hypot(tdx, tdy);
    var outward;
    if (resizeCorner === 'nw') outward = -tdx - tdy;
    else if (resizeCorner === 'ne') outward = tdx - tdy;
    else if (resizeCorner === 'sw') outward = -tdx + tdy;
    else outward = tdx + tdy;
    var sign = outward > 0 ? 1 : -1;
    var newDiag = resizeTextStartDiag + sign * dragDist;
    var scale = Math.max(0.25, newDiag / resizeTextStartDiag);
    var newSize = Math.max(4, Math.round(resizeTextStartFontSize * scale));
    selectedTextBlock.style.fontSize = newSize + 'px';
    if (resizeTextUndoSnapshot.width) {
      var origW = parseInt(resizeTextUndoSnapshot.width);
      var newW = Math.max(20, Math.round(origW * scale));
      selectedTextBlock.style.width = newW + 'px';
      selectedTextBlock.style.maxWidth = newW + 'px';
    }
    var newRect = selectedTextBlock.getBoundingClientRect();
    if (resizeCorner === 'nw') {
      selectedTextBlock.style.left = (resizeTextAnchor.x - newRect.width) + 'px';
      selectedTextBlock.style.top = (resizeTextAnchor.y - newRect.height) + 'px';
    } else if (resizeCorner === 'ne') {
      selectedTextBlock.style.top = (resizeTextAnchor.y - newRect.height) + 'px';
    } else if (resizeCorner === 'sw') {
      selectedTextBlock.style.left = (resizeTextAnchor.x - newRect.width) + 'px';
    }
    updateTextMaxWidth(selectedTextBlock);
    positionSelectionBox();
    return;
  }

  if (!resizing || !selectedStroke) return;

  const dx = e.clientX - resizeStartMouse.x;
  const dy = e.clientY - resizeStartMouse.y;

  let scaleX, scaleY;
  if (resizeCorner === 'se') {
    scaleX = (resizeStartBox.w + dx) / resizeStartBox.w;
    scaleY = (resizeStartBox.h + dy) / resizeStartBox.h;
  } else if (resizeCorner === 'nw') {
    scaleX = (resizeStartBox.w - dx) / resizeStartBox.w;
    scaleY = (resizeStartBox.h - dy) / resizeStartBox.h;
  } else if (resizeCorner === 'ne') {
    scaleX = (resizeStartBox.w + dx) / resizeStartBox.w;
    scaleY = (resizeStartBox.h - dy) / resizeStartBox.h;
  } else {
    scaleX = (resizeStartBox.w - dx) / resizeStartBox.w;
    scaleY = (resizeStartBox.h + dy) / resizeStartBox.h;
  }

  scaleX = Math.max(0.1, scaleX);
  scaleY = Math.max(0.1, scaleY);

  if (e.shiftKey) {
    var uniform = Math.max(scaleX, scaleY);
    scaleX = uniform;
    scaleY = uniform;
  }

  var g = selectedStroke.closest('g');

  var ox = resizeOrigin.x;
  var oy = resizeOrigin.y;
  var newState = {
    tx: resizeBaseTranslate.x,
    ty: resizeBaseTranslate.y,
    sx: scaleX,
    sy: scaleY,
    sox: ox,
    soy: oy
  };
  applyTransform(g, newState);

  positionSelectionBox();
});

document.addEventListener('pointerup', function () {
  if (resizingTextEdge) {
    if (resizeEdgeUndoSnapshot && selectedTextBlock) {
      redoStack.length = 0;
      undoStack.push({ type: 'resize-text-box', el: resizeEdgeUndoSnapshot.el, left: resizeEdgeUndoSnapshot.left, top: resizeEdgeUndoSnapshot.top, width: resizeEdgeUndoSnapshot.width, height: resizeEdgeUndoSnapshot.height, maxWidth: resizeEdgeUndoSnapshot.maxWidth, overflow: resizeEdgeUndoSnapshot.overflow });
    }
    resizingTextEdge = false;
    resizeEdge = null;
    resizeEdgeUndoSnapshot = null;
    positionSelectionBox();
  }
  if (resizingText) {
    if (resizeTextUndoSnapshot && selectedTextBlock) {
      redoStack.length = 0;
      undoStack.push({ type: 'resize-text', el: resizeTextUndoSnapshot.el, fontSize: resizeTextUndoSnapshot.fontSize, width: resizeTextUndoSnapshot.width, maxWidth: resizeTextUndoSnapshot.maxWidth, left: resizeTextUndoSnapshot.left, top: resizeTextUndoSnapshot.top });
    }
    resizingText = false;
    resizeTextUndoSnapshot = null;
    positionSelectionBox();
  }
  if (resizing) {
    if (selectedStroke) {
      var g = selectedStroke.closest('g');
      bakeTransform(g);
      if (resizeUndoSnapshot) {
        redoStack.length = 0;
        undoStack.push({ type: 'transform', el: resizeUndoSnapshot.el, visD: resizeUndoSnapshot.visD, hitD: resizeUndoSnapshot.hitD, state: resizeUndoSnapshot.state });
        resizeUndoSnapshot = null;
      }
    }
    resizing = false;
    resizeCorner = null;
    positionSelectionBox();
  }
});

// ── Move Selected Stroke ──────────────────────────────────────────

let movingStroke = false;
let moveStrokeStart = {};
let moveStrokeOrigTranslate = { x: 0, y: 0 };
let moveUndoSnapshot = null;

svgLayer.addEventListener('pointerdown', function (e) {
  if (e.target.tagName !== 'path') return;

  var group = e.target.parentNode;
  var pathEl = group.querySelector('path.visible');
  if (!pathEl) return;

  if (selectedStroke === pathEl) {
    e.preventDefault();
    e.stopPropagation();

    if (document.activeElement && document.activeElement.contentEditable === 'true') {
      document.activeElement.blur();
    }

    movingStroke = true;
    moveStrokeStart = { x: e.clientX, y: e.clientY };
    document.body.classList.add('grabbing');

    var g = pathEl.closest('g');
    var state = getTransformState(g);
    moveStrokeOrigTranslate = { x: state.tx, y: state.ty };

    var visPath = g.querySelector('path.visible');
    var hitPath = g.querySelector('path.hit-target');
    moveUndoSnapshot = {
      el: g,
      visD: visPath ? visPath.getAttribute('d') : '',
      hitD: hitPath ? hitPath.getAttribute('d') : '',
      state: JSON.parse(JSON.stringify(state))
    };
  }
});

document.addEventListener('pointermove', function (e) {
  if (!movingStroke || !selectedStroke) return;

  var dx = e.clientX - moveStrokeStart.x;
  var dy = e.clientY - moveStrokeStart.y;

  var g = selectedStroke.closest('g');

  var tx = moveStrokeOrigTranslate.x + dx;
  var ty = moveStrokeOrigTranslate.y + dy;
  var curState = getTransformState(g);
  var newState = { tx: tx, ty: ty, sx: curState.sx, sy: curState.sy, sox: curState.sox, soy: curState.soy };
  applyTransform(g, newState);

  positionSelectionBox();
});

document.addEventListener('pointerup', function () {
  if (movingStroke) {
    movingStroke = false;
    document.body.classList.remove('grabbing');
    if (selectedStroke) {
      var g = selectedStroke.closest('g');
      bakeTransform(g);
      if (moveUndoSnapshot) {
        redoStack.length = 0;
        undoStack.push({ type: 'transform', el: moveUndoSnapshot.el, visD: moveUndoSnapshot.visD, hitD: moveUndoSnapshot.hitD, state: moveUndoSnapshot.state });
        moveUndoSnapshot = null;
      }
      moveStrokeOrigTranslate = { x: 0, y: 0 };
      positionSelectionBox();
    }
  }
});

// ── Delete Selected Stroke ────────────────────────────────────────

function applyUndoRedo(action) {
  deselectStroke();
  if (action.type === 'stroke') {
    if (action.el.parentNode) action.el.remove();
    return { type: 'add-stroke', el: action.el };
  } else if (action.type === 'add-stroke') {
    svgLayer.appendChild(action.el);
    return { type: 'stroke', el: action.el };
  } else if (action.type === 'text') {
    if (action.el.parentNode) action.el.remove();
    return { type: 'add-text', el: action.el };
  } else if (action.type === 'add-text') {
    document.body.appendChild(action.el);
    action.el.blur();
    return { type: 'text', el: action.el };
  } else if (action.type === 'delete-stroke') {
    svgLayer.appendChild(action.el);
    return { type: 'redo-delete', el: action.el };
  } else if (action.type === 'redo-delete') {
    if (action.el.parentNode) action.el.remove();
    return { type: 'delete-stroke', el: action.el };
  } else if (action.type === 'transform') {
    var g = action.el;
    var visPath = g.querySelector('path.visible');
    var hitPath = g.querySelector('path.hit-target');
    var curVisD = visPath ? visPath.getAttribute('d') : '';
    var curHitD = hitPath ? hitPath.getAttribute('d') : '';
    var curState = JSON.parse(JSON.stringify(getTransformState(g)));
    if (visPath) visPath.setAttribute('d', action.visD);
    if (hitPath) hitPath.setAttribute('d', action.hitD);
    applyTransform(g, action.state);
    return { type: 'transform', el: g, visD: curVisD, hitD: curHitD, state: curState };
  } else if (action.type === 'move-text') {
    var curLeft = parseInt(action.el.style.left);
    var curTop = parseInt(action.el.style.top);
    action.el.style.left = action.left + 'px';
    action.el.style.top = action.top + 'px';
    updateTextMaxWidth(action.el);
    return { type: 'move-text', el: action.el, left: curLeft, top: curTop };
  } else if (action.type === 'resize-text') {
    var bl = action.el;
    var curSize = parseFloat(bl.style.fontSize) || 16;
    var curW = bl.style.width || '';
    var curMW = bl.style.maxWidth || '';
    var curLeft = parseInt(bl.style.left);
    var curTop = parseInt(bl.style.top);
    bl.style.fontSize = action.fontSize + 'px';
    if (action.width !== undefined) {
      bl.style.width = action.width;
      bl.style.maxWidth = action.maxWidth || '';
    }
    if (action.left !== undefined) {
      bl.style.left = action.left + 'px';
      bl.style.top = action.top + 'px';
    }
    updateTextMaxWidth(bl);
    return { type: 'resize-text', el: bl, fontSize: curSize, width: curW, maxWidth: curMW, left: curLeft, top: curTop };
  } else if (action.type === 'resize-text-box') {
    var bl = action.el;
    var cur = { el: bl, left: parseInt(bl.style.left), top: parseInt(bl.style.top), width: bl.style.width || '', height: bl.style.height || '', maxWidth: bl.style.maxWidth || '', overflow: bl.style.overflow || '' };
    bl.style.left = action.left + 'px';
    bl.style.top = action.top + 'px';
    bl.style.width = action.width;
    bl.style.height = action.height;
    bl.style.maxWidth = action.maxWidth;
    bl.style.overflow = action.overflow;
    return { type: 'resize-text-box', el: cur.el, left: cur.left, top: cur.top, width: cur.width, height: cur.height, maxWidth: cur.maxWidth, overflow: cur.overflow };
  } else if (action.type === 'delete-text') {
    document.body.appendChild(action.el);
    return { type: 'redo-delete-text', el: action.el };
  } else if (action.type === 'redo-delete-text') {
    if (action.el.parentNode) action.el.remove();
    return { type: 'delete-text', el: action.el };
  } else if (action.type === 'text-edit') {
    var curHTML = action.el.innerHTML;
    action.el.innerHTML = action.html;
    return { type: 'text-edit', el: action.el, html: curHTML };
  } else if (action.type === 'color-change') {
    var cur = action.el.style[action.prop];
    action.el.style[action.prop] = action.prevValue;
    if (action.prop === 'fill') syncHitTargetPointerEvents(action.el);
    return { type: 'color-change', el: action.el, prop: action.prop, prevValue: cur };
  } else if (action.type === 'multi-move') {
    var reverseItems = action.items.map(function (item) {
      if (item.type === 'text') {
        var cL = parseInt(item.el.style.left), cT = parseInt(item.el.style.top);
        item.el.style.left = item.left + 'px';
        item.el.style.top = item.top + 'px';
        updateTextMaxWidth(item.el);
        return { type: 'text', el: item.el, left: cL, top: cT };
      } else {
        var g = item.el;
        var vp = g.querySelector('path.visible'), hp = g.querySelector('path.hit-target');
        var cVD = vp ? vp.getAttribute('d') : '', cHD = hp ? hp.getAttribute('d') : '';
        var cS = JSON.parse(JSON.stringify(getTransformState(g)));
        if (vp) vp.setAttribute('d', item.visD);
        if (hp) hp.setAttribute('d', item.hitD);
        applyTransform(g, item.state);
        return { type: 'stroke', el: g, visD: cVD, hitD: cHD, state: cS };
      }
    });
    return { type: 'multi-move', items: reverseItems };
  } else if (action.type === 'multi-resize') {
    var reverseItems = action.items.map(function (item) {
      if (item.type === 'text') {
        var cL = parseInt(item.el.style.left), cT = parseInt(item.el.style.top);
        var cFS = parseFloat(item.el.style.fontSize) || 16;
        var cW = item.el.style.width || '', cH = item.el.style.height || '', cMW = item.el.style.maxWidth || '', cOF = item.el.style.overflow || '';
        item.el.style.left = item.left + 'px';
        item.el.style.top = item.top + 'px';
        item.el.style.fontSize = item.fontSize + 'px';
        item.el.style.width = item.width || '';
        item.el.style.height = item.height || '';
        item.el.style.maxWidth = item.maxWidth || '';
        item.el.style.overflow = item.overflow || '';
        updateTextMaxWidth(item.el);
        return { type: 'text', el: item.el, left: cL, top: cT, fontSize: cFS, width: cW, height: cH, maxWidth: cMW, overflow: cOF };
      } else {
        var g = item.el;
        var vp = g.querySelector('path.visible'), hp = g.querySelector('path.hit-target');
        var cVD = vp ? vp.getAttribute('d') : '', cHD = hp ? hp.getAttribute('d') : '';
        var cS = JSON.parse(JSON.stringify(getTransformState(g)));
        if (vp) vp.setAttribute('d', item.visD);
        if (hp) hp.setAttribute('d', item.hitD);
        applyTransform(g, item.state);
        return { type: 'stroke', el: g, visD: cVD, hitD: cHD, state: cS };
      }
    });
    return { type: 'multi-resize', items: reverseItems };
  } else if (action.type === 'multi-delete') {
    action.items.forEach(function (item) {
      if (item.type === 'text') document.body.appendChild(item.el);
      else svgLayer.appendChild(item.el);
    });
    return { type: 'redo-multi-delete', items: action.items };
  } else if (action.type === 'redo-multi-delete') {
    action.items.forEach(function (item) {
      if (item.el.parentNode) item.el.remove();
    });
    return { type: 'multi-delete', items: action.items };
  }
  updateHint();
  return null;
}

document.addEventListener('keydown', function (e) {
  if (document.activeElement && document.activeElement.contentEditable === 'true') {
    var sel = window.getSelection();
    var hasTextSelection = sel && !sel.isCollapsed && sel.toString().length > 0;

    if ((e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      if (!document.activeElement.textContent.trim()) {
        document.activeElement.blur();
      }
    } else if (hasTextSelection && colorBuffer && (e.key === 'Backspace' || e.key === 'Delete')) {
      e.preventDefault();
      colorBuffer = colorBuffer.slice(0, -1);
      clearTimeout(colorBufferTimer);
      if (colorBuffer) {
        colorBufferTimer = setTimeout(function () { colorBuffer = ''; }, 1500);
      }
    } else if (hasTextSelection && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
      e.preventDefault();
      colorBuffer += e.key;
      clearTimeout(colorBufferTimer);
      colorBufferTimer = setTimeout(function () { colorBuffer = ''; }, 1500);

      var appliedColor = resolveColorFromBuffer(colorBuffer);
      if (appliedColor) {
        try {
          var block = document.activeElement;
          var prevHTML = block.innerHTML;
          var span = document.createElement('span');
          span.style.color = appliedColor;
          var range = sel.getRangeAt(0);
          span.appendChild(range.extractContents());
          span.querySelectorAll('[style]').forEach(function (child) {
            child.style.color = '';
            if (!child.getAttribute('style')) child.removeAttribute('style');
          });
          range.insertNode(span);
          sel.selectAllChildren(span);
          redoStack.length = 0;
          undoStack.push({ type: 'text-edit', el: block, html: prevHTML });
        } catch(err) {}
        clearTimeout(colorBufferTimer);
        colorBuffer = '';
      }
    } else if (!((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'o' || e.key === 'l'))) {
      return;
    }
  }

  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    if (!undoStack.length) return;
    var reverse = applyUndoRedo(undoStack.pop());
    if (reverse) redoStack.push(reverse);
    return;
  }

  if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (!redoStack.length) return;
    var reverse = applyUndoRedo(redoStack.pop());
    if (reverse) undoStack.push(reverse);
    return;
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    deselectStroke();
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    var transient = document.querySelectorAll('.selection-box, .multi-select-box, .select-rect, .save-toast');
    transient.forEach(function (el) { el.remove(); });
    var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    var blob = new Blob([html], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'widyo-save.html';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('saved');
    return;
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
    e.preventDefault();
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.html';
    input.style.display = 'none';
    input.addEventListener('change', function () {
      if (!input.files.length) return;
      var reader = new FileReader();
      reader.onload = function () {
        loadSavedContent(reader.result);
        showToast('loaded');
      };
      reader.readAsText(input.files[0]);
      input.remove();
    });
    document.body.appendChild(input);
    input.click();
    return;
  }

  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    document.body.classList.toggle('light-mode');
    return;
  }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (colorBuffer) {
      e.preventDefault();
      colorBuffer = colorBuffer.slice(0, -1);
      clearTimeout(colorBufferTimer);
      if (colorBuffer) {
        colorBufferTimer = setTimeout(function () { colorBuffer = ''; }, 1500);
      }
      return;
    }
    if (multiSelected.length) {
      e.preventDefault();
      var items = multiSelected.map(function (item) {
        item.el.remove();
        return { type: item.type, el: item.el };
      });
      redoStack.length = 0;
      undoStack.push({ type: 'multi-delete', items: items });
      deselectMulti();
      updateHint();
      return;
    }
    if (selectedTextBlock) {
      e.preventDefault();
      redoStack.length = 0;
      undoStack.push({ type: 'delete-text', el: selectedTextBlock });
      selectedTextBlock.remove();
      deselectStroke();
      updateHint();
      return;
    }
    if (selectedStroke) {
      e.preventDefault();
      var group = selectedStroke.closest('g');
      if (group) {
        group.remove();
        redoStack.length = 0;
        undoStack.push({ type: 'delete-stroke', el: group });
      } else {
        selectedStroke.remove();
      }
      deselectStroke();
      updateHint();
    }
    return;
  }

  if ((selectedStroke || selectedTextBlock) && !e.ctrlKey && !e.metaKey && e.key.length === 1) {
    e.preventDefault();
    colorBuffer += e.key;
    clearTimeout(colorBufferTimer);
    colorBufferTimer = setTimeout(function () { colorBuffer = ''; }, 1500);

    var isFill = false;
    var fillMatch = colorBuffer.match(/^fill\s+(.+)/i);
    var colorSource = fillMatch ? fillMatch[1] : colorBuffer;
    var appliedColor = resolveColorFromBuffer(colorSource);
    if (fillMatch && !appliedColor) appliedColor = null;
    if (fillMatch && appliedColor) isFill = true;
    if (!fillMatch) appliedColor = resolveColorFromBuffer(colorBuffer);
    if (appliedColor) {
      if (selectedStroke) {
        var prop = isFill ? 'fill' : 'stroke';
        var prevColor = selectedStroke.style[prop] || '';
        selectedStroke.style[prop] = appliedColor;
        if (isFill) syncHitTargetPointerEvents(selectedStroke);
        redoStack.length = 0;
        undoStack.push({ type: 'color-change', el: selectedStroke, prop: prop, prevValue: prevColor });
      } else if (selectedTextBlock) {
        var prevColor = selectedTextBlock.style.color || '';
        var prevHTML = selectedTextBlock.innerHTML;
        selectedTextBlock.style.color = appliedColor;
        selectedTextBlock.querySelectorAll('[style]').forEach(function (child) {
          child.style.color = '';
          if (!child.getAttribute('style')) child.removeAttribute('style');
        });
        redoStack.length = 0;
        undoStack.push({ type: 'text-edit', el: selectedTextBlock, html: prevHTML });
      }
      clearTimeout(colorBufferTimer);
      colorBuffer = '';
    }
    return;
  }
});

// ── Text Block Creation ───────────────────────────────────────────

function attachTextBlockHandlers(block) {
  var lastClickTime = 0;
  var lastSavedHTML = block.innerHTML || '';
  var textEditTimer = null;

  function saveTextSnapshot() {
    var curHTML = block.innerHTML;
    if (curHTML !== lastSavedHTML) {
      redoStack.length = 0;
      undoStack.push({ type: 'text-edit', el: block, html: lastSavedHTML });
      lastSavedHTML = curHTML;
    }
  }

  block.addEventListener('input', function () {
    clearTimeout(textEditTimer);
    textEditTimer = setTimeout(saveTextSnapshot, 400);
  });

  block.addEventListener('focus', function () {
    lastSavedHTML = block.innerHTML;
  });

  block.addEventListener('pointerdown', function (ev) {
    ev.stopPropagation();

    if (block.contentEditable === 'true' && document.activeElement === block) {
      var now = Date.now();
      var timeSinceLast = now - lastClickTime;
      lastClickTime = now;

      if (timeSinceLast < 400) return;

      var caretNear = false;
      var sel = window.getSelection();
      if (sel && sel.rangeCount) {
        var range = sel.getRangeAt(0);
        var caretRect = range.getBoundingClientRect();
        if (caretRect && caretRect.width === 0) {
          var hDist = Math.abs(ev.clientX - caretRect.left);
          var pad = 10;
          var inVertical = ev.clientY >= caretRect.top - pad && ev.clientY <= caretRect.bottom + pad;
          if (hDist < 20 && inVertical) caretNear = true;
        }
      }
      if (!caretNear) return;

      var focStartX = ev.clientX, focStartY = ev.clientY;
      var focDragged = false;
      function focMove(fm) {
        if (Math.hypot(fm.clientX - focStartX, fm.clientY - focStartY) > THRESHOLD) {
          focDragged = true;
          document.removeEventListener('pointermove', focMove);
          document.removeEventListener('pointerup', focUp);
        }
      }
      function focUp() {
        document.removeEventListener('pointermove', focMove);
        document.removeEventListener('pointerup', focUp);
        if (!focDragged) {
          block.blur();
          block.contentEditable = 'false';
          selectTextBlock(block);
        }
      }
      document.addEventListener('pointermove', focMove);
      document.addEventListener('pointerup', focUp);
      return;
    }

    if (selectedTextBlock === block) {
      var timeSinceLast = Date.now() - lastClickTime;
      if (timeSinceLast < 400) {
        lastClickTime = Date.now();
        block.contentEditable = 'true';
        block.style.userSelect = 'text';
        block.style.webkitUserSelect = 'text';
        block.focus();
        removeSelectionBox();
        selectedTextBlock = null;
        return;
      }
      ev.preventDefault();
      lastClickTime = Date.now();
      var selStartX = ev.clientX, selStartY = ev.clientY;
      var selOrigLeft = parseInt(block.style.left);
      var selOrigTop = parseInt(block.style.top);
      var selDragging = false;
      function selMove(sm) {
        if (Math.hypot(sm.clientX - selStartX, sm.clientY - selStartY) > THRESHOLD) {
          selDragging = true;
          document.body.classList.add('grabbing');
          block.style.left = (selOrigLeft + sm.clientX - selStartX) + 'px';
          block.style.top = (selOrigTop + sm.clientY - selStartY) + 'px';
          updateTextMaxWidth(block);
          positionSelectionBox();
        }
      }
      function selUp() {
        document.removeEventListener('pointermove', selMove);
        document.removeEventListener('pointerup', selUp);
        document.body.classList.remove('grabbing');
        if (!selDragging) {
          lastClickTime = Date.now();
          block.contentEditable = 'true';
          block.style.userSelect = 'text';
          block.style.webkitUserSelect = 'text';
          block.focus();
          removeSelectionBox();
          selectedTextBlock = null;
        } else {
          redoStack.length = 0;
          undoStack.push({ type: 'move-text', el: block, left: selOrigLeft, top: selOrigTop });
          positionSelectionBox();
        }
      }
      document.addEventListener('pointermove', selMove);
      document.addEventListener('pointerup', selUp);
      return;
    }

    var bStartX = ev.clientX, bStartY = ev.clientY;
    var bOrigLeft = parseInt(block.style.left);
    var bOrigTop = parseInt(block.style.top);
    var bDragging = false;

    deselectStroke();

    function onMove(me) {
      var dist = Math.hypot(me.clientX - bStartX, me.clientY - bStartY);
      if (dist > THRESHOLD) {
        bDragging = true;
        document.body.classList.add('grabbing');
        block.style.left = (bOrigLeft + me.clientX - bStartX) + 'px';
        block.style.top = (bOrigTop + me.clientY - bStartY) + 'px';
        updateTextMaxWidth(block);
        if (selectedTextBlock === block) positionSelectionBox();
      }
    }

    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.body.classList.remove('grabbing');
      if (!bDragging) {
        lastClickTime = Date.now();
        selectTextBlock(block);
      } else {
        redoStack.length = 0;
        undoStack.push({ type: 'move-text', el: block, left: bOrigLeft, top: bOrigTop });
        if (selectedTextBlock !== block) selectTextBlock(block);
        else positionSelectionBox();
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  block.addEventListener('blur', function () {
    clearTimeout(textEditTimer);
    saveTextSnapshot();
    if (!block.textContent.trim()) {
      if (selectedTextBlock === block) {
        selectedTextBlock = null;
        removeSelectionBox();
      }
      block.remove();
      updateHint();
    }
  });
}

function createTextBlock(x, y) {
  var block = document.createElement('div');
  block.className = 'text-block';
  block.contentEditable = 'true';
  block.style.left = x + 'px';
  block.style.top = y + 'px';
  block.style.maxWidth = (window.innerWidth - x - 4) + 'px';
  attachTextBlockHandlers(block);
  deselectStroke();
  document.body.appendChild(block);
  block.focus();
  redoStack.length = 0;
  undoStack.push({ type: 'text', el: block });
  updateHint();
}

// ── Save / Open helpers ──────────────────────────────────────────
function showToast(msg) {
  var el = document.createElement('div');
  el.className = 'save-toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function () { el.style.opacity = '0'; }, 1200);
  setTimeout(function () { el.remove(); }, 1600);
}

function loadSavedContent(htmlString) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(htmlString, 'text/html');
  var importedSvg = doc.getElementById('svg-layer');
  if (importedSvg) {
    importedSvg.querySelectorAll('g').forEach(function (g) {
      svgLayer.appendChild(document.adoptNode(g));
      var vp = g.querySelector('path.visible');
      if (vp) syncHitTargetPointerEvents(vp);
    });
  }
  doc.querySelectorAll('.text-block').forEach(function (block) {
    var adopted = document.adoptNode(block);
    adopted.contentEditable = 'false';
    document.body.appendChild(adopted);
    attachTextBlockHandlers(adopted);
  });
  updateHint();
}

// ── Rehydrate saved content on load ───────────────────────────────
document.querySelectorAll('.text-block').forEach(function (block) {
  block.contentEditable = 'false';
  attachTextBlockHandlers(block);
});
svgLayer.querySelectorAll('g path.visible').forEach(function (vp) {
  syncHitTargetPointerEvents(vp);
});
updateHint();

// ── Main Gesture Handler (body pointerdown) ───────────────────────

// ── Multi-Select Move/Resize ──────────────────────────────────────

let multiMoving = false;
let multiMoveStart = {};
let multiMoveSnapshots = [];

let multiResizing = false;
let multiResizeCorner = null;
let multiResizeStartMouse = {};
let multiResizeStartBox = {};
let multiResizeSnapshots = [];

document.addEventListener('pointerdown', function (e) {
  if (!multiSelectBox || !multiSelected.length) return;

  if (e.target.dataset.multi === 'true' && e.target.classList.contains('selection-handle')) {
    e.preventDefault();
    e.stopPropagation();
    multiResizing = true;
    multiResizeCorner = e.target.dataset.corner;
    multiResizeStartMouse = { x: e.clientX, y: e.clientY };
    var br = multiSelectBox.getBoundingClientRect();
    multiResizeStartBox = { left: br.left, top: br.top, width: br.width, height: br.height };
    multiResizeSnapshots = multiSelected.map(function (item) {
      if (item.type === 'text') {
        return { type: 'text', el: item.el, left: parseInt(item.el.style.left), top: parseInt(item.el.style.top), fontSize: parseFloat(item.el.style.fontSize) || 16, width: item.el.style.width || '', height: item.el.style.height || '', maxWidth: item.el.style.maxWidth || '', overflow: item.el.style.overflow || '' };
      } else {
        var g = item.el;
        var vp = g.querySelector('path.visible'), hp = g.querySelector('path.hit-target');
        return { type: 'stroke', el: g, visD: vp ? vp.getAttribute('d') : '', hitD: hp ? hp.getAttribute('d') : '', state: JSON.parse(JSON.stringify(getTransformState(g))) };
      }
    });
    return;
  }

  if (e.target === multiSelectBox || multiSelectBox.contains(e.target)) {
    e.preventDefault();
    e.stopPropagation();
    multiMoving = true;
    multiMoveStart = { x: e.clientX, y: e.clientY };
    document.body.classList.add('grabbing');
    multiMoveSnapshots = multiSelected.map(function (item) {
      if (item.type === 'text') {
        return { type: 'text', el: item.el, left: parseInt(item.el.style.left), top: parseInt(item.el.style.top) };
      } else {
        var g = item.el;
        var vp = g.querySelector('path.visible'), hp = g.querySelector('path.hit-target');
        return { type: 'stroke', el: g, visD: vp ? vp.getAttribute('d') : '', hitD: hp ? hp.getAttribute('d') : '', state: JSON.parse(JSON.stringify(getTransformState(g))) };
      }
    });
    return;
  }
}, true);

document.addEventListener('pointermove', function (e) {
  if (multiMoving) {
    var dx = e.clientX - multiMoveStart.x;
    var dy = e.clientY - multiMoveStart.y;
    multiSelected.forEach(function (item, i) {
      if (item.type === 'text') {
        item.el.style.left = (multiMoveSnapshots[i].left + dx) + 'px';
        item.el.style.top = (multiMoveSnapshots[i].top + dy) + 'px';
        updateTextMaxWidth(item.el);
      } else {
        var state = getTransformState(item.el);
        var origState = multiMoveSnapshots[i].state;
        applyTransform(item.el, { tx: origState.tx + dx, ty: origState.ty + dy, sx: state.sx, sy: state.sy, sox: state.sox, soy: state.soy });
      }
    });
    positionMultiSelectBox();
    return;
  }

  if (multiResizing) {
    var dx = e.clientX - multiResizeStartMouse.x;
    var dy = e.clientY - multiResizeStartMouse.y;
    var sb = multiResizeStartBox;
    var scale;
    if (multiResizeCorner === 'se') scale = Math.max(0.1, ((sb.width + dx) + (sb.height + dy)) / (sb.width + sb.height));
    else if (multiResizeCorner === 'nw') scale = Math.max(0.1, ((sb.width - dx) + (sb.height - dy)) / (sb.width + sb.height));
    else if (multiResizeCorner === 'ne') scale = Math.max(0.1, ((sb.width + dx) + (sb.height - dy)) / (sb.width + sb.height));
    else scale = Math.max(0.1, ((sb.width - dx) + (sb.height + dy)) / (sb.width + sb.height));

    var originX, originY;
    if (multiResizeCorner === 'se') { originX = sb.left; originY = sb.top; }
    else if (multiResizeCorner === 'nw') { originX = sb.left + sb.width; originY = sb.top + sb.height; }
    else if (multiResizeCorner === 'ne') { originX = sb.left; originY = sb.top + sb.height; }
    else { originX = sb.left + sb.width; originY = sb.top; }

    multiSelected.forEach(function (item, i) {
      var snap = multiResizeSnapshots[i];
      if (item.type === 'text') {
        var newLeft = originX + (snap.left - originX) * scale;
        var newTop = originY + (snap.top - originY) * scale;
        var newFS = Math.max(4, Math.round(snap.fontSize * scale));
        item.el.style.left = Math.round(newLeft) + 'px';
        item.el.style.top = Math.round(newTop) + 'px';
        item.el.style.fontSize = newFS + 'px';
        if (snap.width) {
          var newW = Math.max(20, Math.round(parseInt(snap.width) * scale));
          item.el.style.width = newW + 'px';
          item.el.style.maxWidth = newW + 'px';
        } else {
          updateTextMaxWidth(item.el);
        }
        if (snap.height) {
          item.el.style.height = Math.max(16, Math.round(parseInt(snap.height) * scale)) + 'px';
        }
      } else {
        var g = item.el;
        applyTransform(g, { tx: snap.state.tx, ty: snap.state.ty, sx: scale, sy: scale, sox: originX, soy: originY });
      }
    });
    positionMultiSelectBox();
    return;
  }
});

document.addEventListener('pointerup', function () {
  if (multiMoving) {
    multiMoving = false;
    document.body.classList.remove('grabbing');
    multiSelected.forEach(function (item) {
      if (item.type === 'stroke') bakeTransform(item.el);
    });
    redoStack.length = 0;
    undoStack.push({ type: 'multi-move', items: multiMoveSnapshots });
    multiMoveSnapshots = [];
    positionMultiSelectBox();
  }
  if (multiResizing) {
    multiResizing = false;
    multiSelected.forEach(function (item) {
      if (item.type === 'stroke') bakeTransform(item.el);
    });
    redoStack.length = 0;
    undoStack.push({ type: 'multi-resize', items: multiResizeSnapshots });
    multiResizeSnapshots = [];
    positionMultiSelectBox();
  }
});

// ── Main Gesture Handler (body pointerdown) ───────────────────────

document.body.addEventListener('pointerdown', function (e) {
  if (e.target.classList.contains('text-block')) return;
  if (e.target.classList.contains('selection-handle')) return;
  if (e.target === multiSelectBox || (multiSelectBox && multiSelectBox.contains(e.target))) return;

  var clickedPathEl = null;
  if (e.target.tagName === 'path') {
    var group = e.target.parentNode;
    clickedPathEl = group ? group.querySelector('path.visible') : null;
    if (clickedPathEl && selectedStroke === clickedPathEl) return;
  }

  e.preventDefault();

  if (document.activeElement && document.activeElement.contentEditable === 'true') {
    document.activeElement.blur();
  }

  deselectStroke();

  if (e.button === 2) {
    var rsX = e.clientX, rsY = e.clientY;
    var selectRect = document.createElement('div');
    selectRect.className = 'select-rect';
    document.body.appendChild(selectRect);
    suppressContextMenu = true;

    function rsMove(rm) {
      var x1 = Math.min(rsX, rm.clientX), y1 = Math.min(rsY, rm.clientY);
      var x2 = Math.max(rsX, rm.clientX), y2 = Math.max(rsY, rm.clientY);
      selectRect.style.left = x1 + 'px';
      selectRect.style.top = y1 + 'px';
      selectRect.style.width = (x2 - x1) + 'px';
      selectRect.style.height = (y2 - y1) + 'px';
    }

    function rsUp(ru) {
      document.removeEventListener('pointermove', rsMove);
      document.removeEventListener('pointerup', rsUp);
      var rr = selectRect.getBoundingClientRect();
      selectRect.remove();

      if (rr.width < 5 && rr.height < 5) return;

      var found = [];
      function rectsOverlap(a, b) {
        return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
      }

      document.querySelectorAll('.text-block').forEach(function (tb) {
        if (rectsOverlap(rr, tb.getBoundingClientRect())) {
          found.push({ type: 'text', el: tb });
        }
      });
      svgLayer.querySelectorAll('g').forEach(function (g) {
        var vis = g.querySelector('path.visible');
        if (vis && rectsOverlap(rr, vis.getBoundingClientRect())) {
          found.push({ type: 'stroke', el: g });
        }
      });

      if (found.length) {
        createMultiSelectBox();
        multiSelected = found;
        positionMultiSelectBox();
      }
    }

    document.addEventListener('pointermove', rsMove);
    document.addEventListener('pointerup', rsUp);
    return;
  }

  startX = e.clientX;
  startY = e.clientY;
  isDragging = false;
  currentGroup = null;
  currentPath = null;
  currentHitPath = null;
  points = [];
  var shiftDrawing = false;
  var shiftPoints = [];
  var shiftMaxDist = 0;
  var shiftPathLen = 0;

  function snapLineEnd(ex, ey) {
    var SNAP_DEG = 1;
    var angle = Math.abs(Math.atan2(ey - startY, ex - startX) * 180 / Math.PI);
    if (angle < SNAP_DEG || angle > 180 - SNAP_DEG) ey = startY;
    else if (Math.abs(angle - 90) < SNAP_DEG) ex = startX;
    return [ex, ey];
  }

  function ensureGroup() {
    if (!currentGroup) {
      currentGroup = document.createElementNS(svgNS, 'g');
      currentHitPath = document.createElementNS(svgNS, 'path');
      currentHitPath.classList.add('hit-target');
      currentPath = document.createElementNS(svgNS, 'path');
      currentPath.classList.add('visible');
      currentGroup.appendChild(currentHitPath);
      currentGroup.appendChild(currentPath);
      svgLayer.appendChild(currentGroup);
      updateHint();
    }
  }

  function onMove(me) {
    var dist = Math.hypot(me.clientX - startX, me.clientY - startY);
    if (dist > THRESHOLD) {
      isDragging = true;
      document.body.classList.add('drawing');

      if (me.shiftKey) {
        shiftDrawing = true;
        var px = me.clientX, py = me.clientY;
        if (shiftPoints.length > 0) {
          var last = shiftPoints[shiftPoints.length - 1];
          shiftPathLen += Math.hypot(px - last[0], py - last[1]);
        }
        shiftPoints.push([px, py]);
        var distFromStart = Math.hypot(px - startX, py - startY);
        if (distFromStart > shiftMaxDist) shiftMaxDist = distFromStart;
      }

      var coalesced = (me.getCoalescedEvents && me.getCoalescedEvents()) || [me];
      for (var ci = 0; ci < coalesced.length; ci++) {
        var cx = coalesced[ci].clientX, cy = coalesced[ci].clientY;
        if (points.length === 0 || Math.hypot(cx - points[points.length - 1][0], cy - points[points.length - 1][1]) >= 3) {
          points.push([cx, cy]);
        }
      }

      ensureGroup();

      var smoothed = smoothPoints(points);
      var tip = [me.clientX, me.clientY];
      var lastSmoothed = smoothed[smoothed.length - 1];
      if (lastSmoothed && (tip[0] !== lastSmoothed[0] || tip[1] !== lastSmoothed[1])) {
        smoothed.push(tip);
      }
      currentPath.setAttribute('d', buildSmoothPath(smoothed));
      currentHitPath.setAttribute('d', buildHitPathD(points));
    }
  }

  function onUp(ue) {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);

    if (!isDragging) {
      if (clickedPathEl) {
        selectStroke(clickedPathEl);
      } else {
        createTextBlock(startX, startY);
      }
    } else if (shiftDrawing && currentGroup) {
      var fx = ue.clientX, fy = ue.clientY;
      if (shiftPoints.length > 0) {
        var last = shiftPoints[shiftPoints.length - 1];
        shiftPathLen += Math.hypot(fx - last[0], fy - last[1]);
      }
      shiftPoints.push([fx, fy]);
      var finalDist = Math.hypot(fx - startX, fy - startY);
      if (finalDist > shiftMaxDist) shiftMaxDist = finalDist;

      var shapeD = null;
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (var si = 0; si < shiftPoints.length; si++) {
        if (shiftPoints[si][0] < minX) minX = shiftPoints[si][0];
        if (shiftPoints[si][1] < minY) minY = shiftPoints[si][1];
        if (shiftPoints[si][0] > maxX) maxX = shiftPoints[si][0];
        if (shiftPoints[si][1] > maxY) maxY = shiftPoints[si][1];
      }
      var bboxDiag = Math.hypot(maxX - minX, maxY - minY);
      var epsilon = bboxDiag * 0.08;

      var simplified = rdpSimplify(shiftPoints, epsilon);

      if (simplified.length >= 3) {
        var first = simplified[0], last = simplified[simplified.length - 1];
        if (Math.hypot(last[0] - first[0], last[1] - first[1]) < bboxDiag * 0.15) {
          simplified.pop();
        }
      }

      var pruned = true;
      while (pruned && simplified.length > 3) {
        pruned = false;
        for (var ai = 0; ai < simplified.length; ai++) {
          var prev = simplified[(ai - 1 + simplified.length) % simplified.length];
          var cur = simplified[ai];
          var next = simplified[(ai + 1) % simplified.length];
          var v1x = prev[0] - cur[0], v1y = prev[1] - cur[1];
          var v2x = next[0] - cur[0], v2y = next[1] - cur[1];
          var dot = v1x * v2x + v1y * v2y;
          var cross = v1x * v2y - v1y * v2x;
          var angle = Math.abs(Math.atan2(cross, dot)) * 180 / Math.PI;
          if (angle > 155 || angle < 20) {
            simplified.splice(ai, 1);
            pruned = true;
            break;
          }
        }
      }

      var isClosed = shiftPoints.length > 8 && shiftMaxDist > 20 && shiftPathLen > finalDist * 1.5;

      if (isClosed && simplified.length >= 5) {
        var c = fitCircle(shiftPoints);
        shapeD = buildEllipsePath(c.cx, c.cy, c.rx, c.ry);
      } else if (simplified.length === 4) {
        var corners = fitRectangle(simplified);
        shapeD = buildRectPath(corners[0], corners[1], corners[2], corners[3]);
      } else if (simplified.length === 3) {
        var tri = fitTriangle(simplified);
        shapeD = buildTrianglePath(tri[0], tri[1], tri[2]);
      } else if (isClosed) {
        var c = fitCircle(shiftPoints);
        shapeD = buildEllipsePath(c.cx, c.cy, c.rx, c.ry);
      } else {
        var end = snapLineEnd(fx, fy);
        shapeD = 'M' + startX.toFixed(2) + ',' + startY.toFixed(2) + ' L' + end[0].toFixed(2) + ',' + end[1].toFixed(2);
      }

      currentPath.setAttribute('d', shapeD);
      currentHitPath.setAttribute('d', shapeD);
      redoStack.length = 0;
      undoStack.push({ type: 'stroke', el: currentGroup });
      updateHint();
    } else if (currentGroup && points.length < 3) {
      currentGroup.remove();
    } else if (currentGroup) {
      var smoothed = smoothPoints(points);
      var tip = [ue.clientX, ue.clientY];
      var lastSmoothed = smoothed[smoothed.length - 1];
      if (lastSmoothed && (tip[0] !== lastSmoothed[0] || tip[1] !== lastSmoothed[1])) {
        smoothed.push(tip);
      }
      currentPath.setAttribute('d', buildSmoothPath(smoothed));
      redoStack.length = 0;
      undoStack.push({ type: 'stroke', el: currentGroup });
      updateHint();
    }

    currentGroup = null;
    currentPath = null;
    currentHitPath = null;
    points = [];
    isDragging = false;
    shiftDrawing = false;
    shiftPoints = [];
    shiftMaxDist = 0;
    shiftPathLen = 0;
    document.body.classList.remove('drawing');
  }

  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
});

// ── Drag-and-drop file loading ───────────────────────────────────
document.body.addEventListener('dragover', function (e) { e.preventDefault(); });
document.body.addEventListener('drop', function (e) {
  e.preventDefault();
  var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.html')) return;
  var reader = new FileReader();
  reader.onload = function () {
    loadSavedContent(reader.result);
    showToast('loaded');
  };
  reader.readAsText(file);
});
</script>
</body>
