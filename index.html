<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>typenow</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    cursor: text;
    user-select: none;
    -webkit-user-select: none;
  }

  #svg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #svg-layer path {
    fill: none;
    stroke: #fff;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: stroke;
  }

  .text-block {
    position: absolute;
    z-index: 1;
    color: #fff;
    font-family: monospace;
    font-size: 16px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
    outline: none;
    caret-color: #fff;
    min-width: 1px;
    min-height: 1em;
    user-select: text;
    -webkit-user-select: text;
  }

  .selection-box {
    position: absolute;
    z-index: 2;
    border: 1px dashed rgba(255, 255, 255, 0.6);
    pointer-events: none;
  }
  .selection-handle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #fff;
    border: 1px solid #000;
    pointer-events: all;
    z-index: 3;
  }
  .selection-handle.nw { top: -4px; left: -4px; cursor: nwse-resize; }
  .selection-handle.ne { top: -4px; right: -4px; cursor: nesw-resize; }
  .selection-handle.sw { bottom: -4px; left: -4px; cursor: nesw-resize; }
  .selection-handle.se { bottom: -4px; right: -4px; cursor: nwse-resize; }
</style>
</head>
<body>

<svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
(function () {
  const THRESHOLD = 4;
  const svgLayer = document.getElementById('svg-layer');
  const svgNS = 'http://www.w3.org/2000/svg';

  let startX, startY;
  let isDragging = false;
  let currentPath = null;
  let points = [];
  let selectedStroke = null;
  let selectionBox = null;

  // ── Stroke Selection ──────────────────────────────────────────────

  function deselectStroke() {
    selectedStroke = null;
    if (selectionBox) {
      selectionBox.remove();
      selectionBox = null;
    }
  }

  function selectStroke(pathEl) {
    deselectStroke();
    selectedStroke = pathEl;

    const bbox = pathEl.getBBox();
    const box = document.createElement('div');
    box.className = 'selection-box';
    box.style.left = bbox.x + 'px';
    box.style.top = bbox.y + 'px';
    box.style.width = bbox.width + 'px';
    box.style.height = bbox.height + 'px';

    ['nw', 'ne', 'sw', 'se'].forEach(function (corner) {
      const handle = document.createElement('div');
      handle.className = 'selection-handle ' + corner;
      handle.dataset.corner = corner;
      box.appendChild(handle);
    });

    document.body.appendChild(box);
    selectionBox = box;
  }

  function updateSelectionBox() {
    if (!selectedStroke || !selectionBox) return;
    const bbox = selectedStroke.getBBox();
    const transform = selectedStroke.parentNode.tagName === 'g'
      ? selectedStroke.parentNode.getCTM()
      : null;

    if (transform) {
      const svgRect = svgLayer.getBoundingClientRect();
      const pt1 = svgLayer.createSVGPoint();
      pt1.x = bbox.x; pt1.y = bbox.y;
      const pt2 = svgLayer.createSVGPoint();
      pt2.x = bbox.x + bbox.width; pt2.y = bbox.y + bbox.height;

      const t1 = pt1.matrixTransform(transform);
      const t2 = pt2.matrixTransform(transform);

      selectionBox.style.left = Math.min(t1.x, t2.x) + 'px';
      selectionBox.style.top = Math.min(t1.y, t2.y) + 'px';
      selectionBox.style.width = Math.abs(t2.x - t1.x) + 'px';
      selectionBox.style.height = Math.abs(t2.y - t1.y) + 'px';
    } else {
      selectionBox.style.left = bbox.x + 'px';
      selectionBox.style.top = bbox.y + 'px';
      selectionBox.style.width = bbox.width + 'px';
      selectionBox.style.height = bbox.height + 'px';
    }
  }

  // ── Resize Handles ────────────────────────────────────────────────

  let resizing = false;
  let resizeCorner = null;
  let resizeOrigin = {};
  let resizeStartMouse = {};
  let resizeStartBox = {};

  document.addEventListener('mousedown', function (e) {
    if (e.target.classList.contains('selection-handle') && selectedStroke) {
      e.preventDefault();
      e.stopPropagation();
      resizing = true;
      resizeCorner = e.target.dataset.corner;
      resizeStartMouse = { x: e.clientX, y: e.clientY };

      const bbox = selectedStroke.getBBox();
      resizeStartBox = { x: bbox.x, y: bbox.y, w: bbox.width, h: bbox.height };

      if (resizeCorner === 'nw') resizeOrigin = { x: bbox.x + bbox.width, y: bbox.y + bbox.height };
      else if (resizeCorner === 'ne') resizeOrigin = { x: bbox.x, y: bbox.y + bbox.height };
      else if (resizeCorner === 'sw') resizeOrigin = { x: bbox.x + bbox.width, y: bbox.y };
      else resizeOrigin = { x: bbox.x, y: bbox.y };
    }
  }, true);

  document.addEventListener('mousemove', function (e) {
    if (!resizing || !selectedStroke) return;

    const dx = e.clientX - resizeStartMouse.x;
    const dy = e.clientY - resizeStartMouse.y;

    let scaleX, scaleY;
    if (resizeCorner === 'se') {
      scaleX = (resizeStartBox.w + dx) / resizeStartBox.w;
      scaleY = (resizeStartBox.h + dy) / resizeStartBox.h;
    } else if (resizeCorner === 'nw') {
      scaleX = (resizeStartBox.w - dx) / resizeStartBox.w;
      scaleY = (resizeStartBox.h - dy) / resizeStartBox.h;
    } else if (resizeCorner === 'ne') {
      scaleX = (resizeStartBox.w + dx) / resizeStartBox.w;
      scaleY = (resizeStartBox.h - dy) / resizeStartBox.h;
    } else {
      scaleX = (resizeStartBox.w - dx) / resizeStartBox.w;
      scaleY = (resizeStartBox.h + dy) / resizeStartBox.h;
    }

    scaleX = Math.max(0.1, scaleX);
    scaleY = Math.max(0.1, scaleY);

    var g = selectedStroke.parentNode;
    if (g.tagName !== 'g') {
      var wrapper = document.createElementNS(svgNS, 'g');
      g.replaceChild(wrapper, selectedStroke);
      wrapper.appendChild(selectedStroke);
      g = wrapper;
    }

    var ox = resizeOrigin.x;
    var oy = resizeOrigin.y;
    g.setAttribute('transform',
      'translate(' + ox + ',' + oy + ') ' +
      'scale(' + scaleX + ',' + scaleY + ') ' +
      'translate(' + (-ox) + ',' + (-oy) + ')'
    );

    updateSelectionBox();
  });

  document.addEventListener('mouseup', function () {
    if (resizing) {
      resizing = false;
      resizeCorner = null;
    }
  });

  // ── Move Selected Stroke ──────────────────────────────────────────

  let movingStroke = false;
  let moveStrokeStart = {};
  let moveStrokeOrigTranslate = { x: 0, y: 0 };

  svgLayer.addEventListener('mousedown', function (e) {
    if (e.target.tagName !== 'path') return;
    e.preventDefault();
    e.stopPropagation();

    var pathEl = e.target;

    if (selectedStroke === pathEl) {
      movingStroke = true;
      moveStrokeStart = { x: e.clientX, y: e.clientY };

      var g = pathEl.parentNode;
      if (g.tagName === 'g') {
        var t = g.getAttribute('transform') || '';
        var match = t.match(/translate\(([^,]+),([^)]+)\)/);
        if (match) {
          moveStrokeOrigTranslate = { x: parseFloat(match[1]), y: parseFloat(match[2]) };
        } else {
          moveStrokeOrigTranslate = { x: 0, y: 0 };
        }
      } else {
        moveStrokeOrigTranslate = { x: 0, y: 0 };
      }
      return;
    }

    selectStroke(pathEl);
  });

  document.addEventListener('mousemove', function (e) {
    if (!movingStroke || !selectedStroke) return;

    var dx = e.clientX - moveStrokeStart.x;
    var dy = e.clientY - moveStrokeStart.y;

    var g = selectedStroke.parentNode;
    if (g.tagName !== 'g') {
      var wrapper = document.createElementNS(svgNS, 'g');
      g.replaceChild(wrapper, selectedStroke);
      wrapper.appendChild(selectedStroke);
      g = wrapper;
    }

    var tx = moveStrokeOrigTranslate.x + dx;
    var ty = moveStrokeOrigTranslate.y + dy;
    g.setAttribute('transform', 'translate(' + tx + ',' + ty + ')');

    updateSelectionBox();
  });

  document.addEventListener('mouseup', function () {
    if (movingStroke) {
      movingStroke = false;
      if (selectedStroke) {
        var g = selectedStroke.parentNode;
        if (g.tagName === 'g') {
          var t = g.getAttribute('transform') || '';
          var match = t.match(/translate\(([^,]+),([^)]+)\)/);
          if (match) {
            moveStrokeOrigTranslate = { x: parseFloat(match[1]), y: parseFloat(match[2]) };
          }
        }
      }
    }
  });

  // ── Delete Selected Stroke ────────────────────────────────────────

  document.addEventListener('keydown', function (e) {
    if (!selectedStroke) return;

    if (document.activeElement && document.activeElement.contentEditable === 'true') return;

    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      var parent = selectedStroke.parentNode;
      if (parent.tagName === 'g') {
        parent.remove();
      } else {
        selectedStroke.remove();
      }
      deselectStroke();
    }
  });

  // ── Freehand Drawing (SVG path) ───────────────────────────────────

  function buildPathD(pts) {
    if (pts.length < 2) return '';
    var d = 'M ' + pts[0].x + ' ' + pts[0].y;
    if (pts.length === 2) {
      d += ' L ' + pts[1].x + ' ' + pts[1].y;
      return d;
    }
    for (var i = 1; i < pts.length - 1; i++) {
      var mx = (pts[i].x + pts[i + 1].x) / 2;
      var my = (pts[i].y + pts[i + 1].y) / 2;
      d += ' Q ' + pts[i].x + ' ' + pts[i].y + ' ' + mx + ' ' + my;
    }
    var last = pts[pts.length - 1];
    d += ' L ' + last.x + ' ' + last.y;
    return d;
  }

  // ── Text Block Creation ───────────────────────────────────────────

  function createTextBlock(x, y) {
    var block = document.createElement('div');
    block.className = 'text-block';
    block.contentEditable = 'true';
    block.style.left = x + 'px';
    block.style.top = y + 'px';
    block.style.maxWidth = (window.innerWidth - x - 4) + 'px';

    var blockStartX, blockStartY, blockOrigLeft, blockOrigTop, blockDragging = false;

    block.addEventListener('mousedown', function (ev) {
      ev.stopPropagation();
      deselectStroke();

      blockStartX = ev.clientX;
      blockStartY = ev.clientY;
      blockOrigLeft = parseInt(block.style.left);
      blockOrigTop = parseInt(block.style.top);
      blockDragging = false;

      function onMove(me) {
        var dist = Math.hypot(me.clientX - blockStartX, me.clientY - blockStartY);
        if (dist > THRESHOLD) {
          blockDragging = true;
          block.blur();
          block.style.cursor = 'grabbing';
          block.style.left = (blockOrigLeft + me.clientX - blockStartX) + 'px';
          block.style.top = (blockOrigTop + me.clientY - blockStartY) + 'px';
          block.style.maxWidth = (window.innerWidth - parseInt(block.style.left) - 4) + 'px';
        }
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        block.style.cursor = '';
        if (!blockDragging) {
          block.focus();
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    block.addEventListener('blur', function () {
      if (!block.textContent.trim()) {
        block.remove();
      }
    });

    document.body.appendChild(block);
    block.focus();
  }

  // ── Main Gesture Handler (body mousedown) ─────────────────────────

  document.body.addEventListener('mousedown', function (e) {
    if (e.target.classList.contains('text-block')) return;
    if (e.target.classList.contains('selection-handle')) return;
    if (e.target.tagName === 'path') return;

    e.preventDefault();

    startX = e.clientX;
    startY = e.clientY;
    isDragging = false;
    currentPath = null;
    points = [{ x: e.clientX, y: e.clientY }];

    deselectStroke();

    function onMove(me) {
      var dist = Math.hypot(me.clientX - startX, me.clientY - startY);
      if (dist > THRESHOLD) {
        isDragging = true;
        points.push({ x: me.clientX, y: me.clientY });

        if (!currentPath) {
          currentPath = document.createElementNS(svgNS, 'path');
          svgLayer.appendChild(currentPath);
        }
        currentPath.setAttribute('d', buildPathD(points));
      }
    }

    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);

      if (!isDragging) {
        createTextBlock(startX, startY);
      } else if (currentPath && points.length < 3) {
        currentPath.remove();
      }

      currentPath = null;
      points = [];
      isDragging = false;
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();
</script>
</body>
</html>
